name: Post YouTube Shorts Batch

on:
  schedule:
    # Runs once daily at 22:00 UTC (which is 03:00 AM PKT the next day)
    - cron: '0 22 * * *'
  workflow_dispatch: # Allows manual triggering from GitHub UI

jobs:
  build-and-post:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to commit lessons.json updates back to the repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install system dependencies (FFmpeg)
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Pipeline (Batch of 6)
        env:
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_OAUTH_TOKEN: ${{ secrets.YOUTUBE_OAUTH_TOKEN }}
        run: |
          python main.py

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add lessons.json
          
          # Only commit if lessons.json has changed
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update lessons.json [skip ci]" && git push)
